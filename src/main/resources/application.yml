server:
  port: 8080
  servlet:
    context-path: /waveai

waveai:
  api:
    base-url: https://api.wave.co/v1
    token: ${WAVEAI_API_TOKEN:your-token-here}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/waveai}
    username: ${DB_USERNAME:waveai}
    password: ${DB_PASSWORD:waveai}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

sync:
  schedule: "0 */15 * * * *"
