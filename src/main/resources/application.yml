server:
  port: 8080
  servlet:
    context-path: /waveai

waveai:
  api:
    base-url: https://api.wave.co/v1
    token: ${WAVEAI_API_TOKEN:your-token-here}

spring:
  # Datasource lives in profile-specific files: application-local.yml
  # (Docker Postgres, the default) and application-neon.yml (Neon).
  profiles:
    default: local
  datasource:
    hikari:
      # Tuned for serverless Postgres (Neon): computes scale to zero and drop
      # idle connections, so recycle connections before that bites and allow
      # time for cold-start wake-up. Harmless against local Docker Postgres.
      max-lifetime: 300000
      keepalive-time: 240000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

sync:
  schedule: "0 */15 * * * *"
